aid: docparser
name: Docparser
description: >-
  Docparser is a document data extraction REST API that enables developers and
  businesses to parse structured data from PDFs, Word documents, and scanned
  image files using custom parsing rules. The platform supports advanced zonal
  OCR, pattern recognition, and anchor keyword detection for automating data
  extraction from invoices, contracts, purchase orders, bank statements, HR
  forms, and shipping documents. Docparser provides a REST API with endpoints
  for uploading documents, fetching parsed results, managing parsers, and
  re-processing documents, along with webhook support for real-time data
  delivery and official SDKs for PHP, Node.js, and Salesforce Apex.
